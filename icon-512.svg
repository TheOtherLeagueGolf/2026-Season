<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');</style>

  <!-- Background -->
  <rect width="512" height="512" fill="#0f7a3a" rx="64"/>

  <!-- Top: THE OTHER LEAGUE -->
  <text x="256" y="80" text-anchor="middle"
        font-family="'Inter',system-ui,-apple-system,sans-serif"
        font-size="43" font-weight="900" fill="white" letter-spacing="3">THE OTHER</text>
  <text x="256" y="133" text-anchor="middle"
        font-family="'Inter',system-ui,-apple-system,sans-serif"
        font-size="43" font-weight="900" fill="white" letter-spacing="3">LEAGUE</text>

  <!-- Flagstick (centered) -->
  <line x1="235" y1="165" x2="235" y2="368"
        stroke="white" stroke-width="13" stroke-linecap="round"/>

  <!-- Flag -->
  <polygon points="235,165 341,200 235,240" fill="white"/>

  <!-- Hole / cup -->
  <ellipse cx="235" cy="368" rx="59" ry="21"
           stroke="white" stroke-width="11" fill="none"/>

  <!-- Golf ball — solid white, sits to right at cup level -->
  <circle cx="336" cy="355" r="19" fill="white"/>

  <!-- Bottom: 2026 -->
  <text x="256" y="459" text-anchor="middle"
        font-family="'Inter',system-ui,-apple-system,sans-serif"
        font-size="43" font-weight="900" fill="white" letter-spacing="8">2026</text>
</svg>
