<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');</style>

  <!-- Background -->
  <rect width="192" height="192" fill="#0f7a3a" rx="24"/>

  <!-- Top: THE OTHER LEAGUE -->
  <text x="96" y="30" text-anchor="middle"
        font-family="'Inter',system-ui,-apple-system,sans-serif"
        font-size="16" font-weight="900" fill="white" letter-spacing="1">THE OTHER</text>
  <text x="96" y="50" text-anchor="middle"
        font-family="'Inter',system-ui,-apple-system,sans-serif"
        font-size="16" font-weight="900" fill="white" letter-spacing="1">LEAGUE</text>

  <!-- Flagstick (centered) -->
  <line x1="88" y1="62" x2="88" y2="138"
        stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Flag -->
  <polygon points="88,62 128,75 88,90" fill="white"/>

  <!-- Hole / cup -->
  <ellipse cx="88" cy="138" rx="22" ry="8"
           stroke="white" stroke-width="4" fill="none"/>

  <!-- Golf ball — sits to the right at cup level -->
  <circle cx="126" cy="133" r="7" fill="white"/>

  <!-- Bottom: 2026 -->
  <text x="96" y="172" text-anchor="middle"
        font-family="'Inter',system-ui,-apple-system,sans-serif"
        font-size="16" font-weight="900" fill="white" letter-spacing="3">2026</text>
</svg>
